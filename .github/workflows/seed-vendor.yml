name: Seed Vendor

on:
  workflow_dispatch:
    inputs:
      domain:
        description: Vendor domain to resolve and seed
        required: true
        type: string
      base_url:
        description: Optional deployed API base URL override
        required: false
        type: string

jobs:
  seed:
    runs-on: ubuntu-latest
    env:
      BMT_API_BASE_URL: ${{ inputs.base_url != '' && inputs.base_url || vars.BMT_API_BASE_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Seed vendor
        run: python scripts/seed_vendor.py --domain "${{ inputs.domain }}"
